[build-system]
requires = [
    "scikit-build-core>=0.9.0",
    "nanobind",
    "rdkit",
]
build-backend = "scikit_build_core.build"

[project]
name = "coot_headless_api"
version = "1.3.1"
description = "Headless API for Coot"
authors = [{name = "Jordan Dialpuri"}, {name = "Lucrezia Catapano"}, {name = "Paul Emsley", email = ""}]
license = {text = "GPLv3"}
requires-python = ">=3.9"
dependencies = ["rdkit"]

[tool.scikit-build]
cmake.source-dir = "coot"
cmake.build-type = "Release"
build-dir = "build_wheel"
cmake.targets = ["coot_headless_api", "coot_headless_api_ext_stub"]

wheel.packages = []

[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-* cp313-*"
skip = "*-musllinux*"
build-frontend = "build[uv]"

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "manylinux_2_28"
before-all = [
    "dnf install -y epel-release",
    "dnf install -y gsl-devel boost-devel libpng-devel zlib-devel cmake ninja-build",
    "bash ./get_sources",
]

[tool.cibuildwheel.macos]
before-all = [
    "brew install gsl boost libpng",
    "bash ./get_sources",
]
archs = ["auto"]
