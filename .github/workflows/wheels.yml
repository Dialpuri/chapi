name: Build wheels

on:
  push:
    tags:
    - "v*"
  workflow_dispatch:
    inputs:
      upload_target:
        description: "Where to upload built wheels"
        required: true
        default: "none"
        type: choice
        options:
        - none
        - testpypi
        - pypi

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, ubuntu-24.04-arm, ubuntu-latest ]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # Restore/save are split (instead of actions/cache@v4) so the RDKit build
    # is cached even when a later wheel-build step fails. The unified action
    # only saves on job success, and `save-always` is deprecated/non-functional.
    - name: Restore RDKit cache (Linux)
      id: rdkit-cache
      if: runner.os == 'Linux'
      uses: actions/cache/restore@v4
      with:
        path: rdkit-install
        key: rdkit-Release_2024_09_5-${{ matrix.os }}

    - name: Build wheels
      uses: pypa/cibuildwheel@v3.0.0
      env:
        CIBW_BUILD_VERBOSITY: 1

    # Save RDKit even if the build failed (always()), but only on a cache miss:
    # before-all builds RDKit into /opt/rdkit and copies it to ./rdkit-install.
    - name: Save RDKit cache (Linux)
      if: always() && runner.os == 'Linux' && steps.rdkit-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: rdkit-install
        key: rdkit-Release_2024_09_5-${{ matrix.os }}

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
        path: ./wheelhouse/*.whl

  upload_testpypi:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.upload_target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/coot_headless_api
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        merge-multiple: true
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  upload_pypi:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.upload_target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/coot_headless_api
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        merge-multiple: true
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
